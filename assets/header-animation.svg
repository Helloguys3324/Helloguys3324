<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- GRADIENTS -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#0d0d2b"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="aurora1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6C63FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6C63FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF6B6B" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aurora2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B6B" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6C63FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="40%" stop-color="#a78bfa"/>
      <stop offset="60%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#6C63FF"/>
      <animate attributeName="x1" values="-100%;100%" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0%;200%" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="subtitleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9d1d9"/>
      <stop offset="100%" stop-color="#8b949e"/>
    </linearGradient>

    <!-- GLOW FILTERS -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- AURORA / NEBULA WAVES -->
  <ellipse cx="300" cy="200" rx="400" ry="120" fill="url(#aurora1)" opacity="0.5">
    <animate attributeName="cx" values="300;500;300" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="120;160;120" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.3;0.5" dur="6s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="900" cy="220" rx="350" ry="100" fill="url(#aurora2)" opacity="0.4">
    <animate attributeName="cx" values="900;700;900" dur="14s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="100;140;100" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.6;0.4" dur="7s" repeatCount="indefinite"/>
  </ellipse>

  <!-- ============ STARS / PARTICLES ============ -->
  <g opacity="0.6">
    <circle cx="50" cy="30" r="1" fill="#fff"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="80" r="1.5" fill="#6C63FF"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite" begin="0.5s"/></circle>
    <circle cx="250" cy="50" r="1" fill="#fff"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="4s" repeatCount="indefinite" begin="1s"/></circle>
    <circle cx="400" cy="35" r="1.2" fill="#a78bfa"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" repeatCount="indefinite" begin="0.3s"/></circle>
    <circle cx="550" cy="60" r="1" fill="#fff"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.8s" repeatCount="indefinite" begin="1.5s"/></circle>
    <circle cx="700" cy="25" r="1.3" fill="#6C63FF"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" repeatCount="indefinite" begin="0.8s"/></circle>
    <circle cx="850" cy="70" r="1" fill="#c084fc"><animate attributeName="opacity" values="0.1;0.7;0.1" dur="4.5s" repeatCount="indefinite" begin="2s"/></circle>
    <circle cx="1000" cy="40" r="1.5" fill="#fff"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite" begin="0.2s"/></circle>
    <circle cx="1100" cy="90" r="1" fill="#a78bfa"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.8s" repeatCount="indefinite" begin="1.2s"/></circle>
    <circle cx="1150" cy="45" r="1.2" fill="#6C63FF"><animate attributeName="opacity" values="0.1;1;0.1" dur="2.2s" repeatCount="indefinite" begin="0.7s"/></circle>
    <circle cx="80" cy="350" r="1" fill="#fff"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.4s" repeatCount="indefinite" begin="1.8s"/></circle>
    <circle cx="200" cy="320" r="1.3" fill="#c084fc"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" repeatCount="indefinite" begin="0.4s"/></circle>
    <circle cx="1050" cy="340" r="1" fill="#6C63FF"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="4.2s" repeatCount="indefinite" begin="1.1s"/></circle>
    <circle cx="950" cy="360" r="1.5" fill="#fff"><animate attributeName="opacity" values="0.1;0.7;0.1" dur="3.6s" repeatCount="indefinite" begin="2.5s"/></circle>
  </g>

  <!-- ============ MATRIX CODE RAIN (LEFT SIDE) ============ -->
  <g font-family="'Courier New', monospace" font-size="14" filter="url(#glowSoft)">
    <!-- Column 1 -->
    <text x="40" y="-10" fill="#6C63FF" opacity="0.7">
      {<animate attributeName="y" values="-10;410" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0.7;0" dur="6s" repeatCount="indefinite"/>
    </text>
    <text x="40" y="-200" fill="#4a45b3" opacity="0.4">
      }<animate attributeName="y" values="-200;410" dur="6s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0;0.4;0.4;0" dur="6s" repeatCount="indefinite" begin="1s"/>
    </text>
    <text x="40" y="-120" fill="#6C63FF" opacity="0.5">
      ;<animate attributeName="y" values="-120;410" dur="6s" repeatCount="indefinite" begin="3s"/>
      <animate attributeName="opacity" values="0;0.5;0.5;0" dur="6s" repeatCount="indefinite" begin="3s"/>
    </text>

    <!-- Column 2 -->
    <text x="80" y="-50" fill="#a78bfa" opacity="0.6">
      =&gt;<animate attributeName="y" values="-50;410" dur="7s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="opacity" values="0;0.6;0.6;0" dur="7s" repeatCount="indefinite" begin="0.5s"/>
    </text>
    <text x="80" y="-250" fill="#6C63FF" opacity="0.3">
      //<animate attributeName="y" values="-250;410" dur="7s" repeatCount="indefinite" begin="2s"/>
      <animate attributeName="opacity" values="0;0.3;0.3;0" dur="7s" repeatCount="indefinite" begin="2s"/>
    </text>

    <!-- Column 3 -->
    <text x="120" y="-30" fill="#c084fc" opacity="0.5">
      ()<animate attributeName="y" values="-30;410" dur="5.5s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0;0.5;0.5;0" dur="5.5s" repeatCount="indefinite" begin="1s"/>
    </text>
    <text x="120" y="-180" fill="#6C63FF" opacity="0.4">
      []<animate attributeName="y" values="-180;410" dur="5.5s" repeatCount="indefinite" begin="3.5s"/>
      <animate attributeName="opacity" values="0;0.4;0.4;0" dur="5.5s" repeatCount="indefinite" begin="3.5s"/>
    </text>

    <!-- Column 4 -->
    <text x="160" y="-80" fill="#6C63FF" opacity="0.6">
      fn<animate attributeName="y" values="-80;410" dur="8s" repeatCount="indefinite" begin="0.2s"/>
      <animate attributeName="opacity" values="0;0.6;0.6;0" dur="8s" repeatCount="indefinite" begin="0.2s"/>
    </text>
    <text x="160" y="-300" fill="#a78bfa" opacity="0.3">
      0x<animate attributeName="y" values="-300;410" dur="8s" repeatCount="indefinite" begin="2.5s"/>
      <animate attributeName="opacity" values="0;0.3;0.3;0" dur="8s" repeatCount="indefinite" begin="2.5s"/>
    </text>

    <!-- Column 5 -->
    <text x="200" y="-150" fill="#6C63FF" opacity="0.5">
      &lt;/&gt;<animate attributeName="y" values="-150;410" dur="6.5s" repeatCount="indefinite" begin="1.5s"/>
      <animate attributeName="opacity" values="0;0.5;0.5;0" dur="6.5s" repeatCount="indefinite" begin="1.5s"/>
    </text>
    <text x="200" y="-20" fill="#c084fc" opacity="0.4">
      $<animate attributeName="y" values="-20;410" dur="6.5s" repeatCount="indefinite" begin="4s"/>
      <animate attributeName="opacity" values="0;0.4;0.4;0" dur="6.5s" repeatCount="indefinite" begin="4s"/>
    </text>

    <!-- RIGHT SIDE RAIN -->
    <!-- Column R1 -->
    <text x="1000" y="-40" fill="#6C63FF" opacity="0.6">
      {}<animate attributeName="y" values="-40;410" dur="7s" repeatCount="indefinite" begin="0.8s"/>
      <animate attributeName="opacity" values="0;0.6;0.6;0" dur="7s" repeatCount="indefinite" begin="0.8s"/>
    </text>
    <text x="1000" y="-220" fill="#a78bfa" opacity="0.3">
      ::<animate attributeName="y" values="-220;410" dur="7s" repeatCount="indefinite" begin="3s"/>
      <animate attributeName="opacity" values="0;0.3;0.3;0" dur="7s" repeatCount="indefinite" begin="3s"/>
    </text>

    <!-- Column R2 -->
    <text x="1040" y="-100" fill="#c084fc" opacity="0.5">
      =&gt;<animate attributeName="y" values="-100;410" dur="6s" repeatCount="indefinite" begin="1.2s"/>
      <animate attributeName="opacity" values="0;0.5;0.5;0" dur="6s" repeatCount="indefinite" begin="1.2s"/>
    </text>

    <!-- Column R3 -->
    <text x="1080" y="-60" fill="#6C63FF" opacity="0.6">
      ++<animate attributeName="y" values="-60;410" dur="5s" repeatCount="indefinite" begin="0.3s"/>
      <animate attributeName="opacity" values="0;0.6;0.6;0" dur="5s" repeatCount="indefinite" begin="0.3s"/>
    </text>
    <text x="1080" y="-250" fill="#a78bfa" opacity="0.3">
      &amp;&amp;<animate attributeName="y" values="-250;410" dur="5s" repeatCount="indefinite" begin="2s"/>
      <animate attributeName="opacity" values="0;0.3;0.3;0" dur="5s" repeatCount="indefinite" begin="2s"/>
    </text>

    <!-- Column R4 -->
    <text x="1120" y="-20" fill="#6C63FF" opacity="0.5">
      /*<animate attributeName="y" values="-20;410" dur="8s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0;0.5;0.5;0" dur="8s" repeatCount="indefinite" begin="1s"/>
    </text>
    <text x="1120" y="-180" fill="#c084fc" opacity="0.4">
      */<animate attributeName="y" values="-180;410" dur="8s" repeatCount="indefinite" begin="4s"/>
      <animate attributeName="opacity" values="0;0.4;0.4;0" dur="8s" repeatCount="indefinite" begin="4s"/>
    </text>

    <!-- Column R5 -->
    <text x="1160" y="-90" fill="#a78bfa" opacity="0.5">
      #<animate attributeName="y" values="-90;410" dur="6.5s" repeatCount="indefinite" begin="0.6s"/>
      <animate attributeName="opacity" values="0;0.5;0.5;0" dur="6.5s" repeatCount="indefinite" begin="0.6s"/>
    </text>
  </g>

  <!-- ============ CONSTELLATION / NEURAL NETWORK ============ -->
  <g filter="url(#glow)">
    <!-- NODES -->
    <circle cx="300" cy="120" r="3" fill="#6C63FF">
      <animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="80" r="2.5" fill="#a78bfa">
      <animate attributeName="r" values="2.5;4;2.5" dur="4s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="380" cy="180" r="2" fill="#c084fc">
      <animate attributeName="r" values="2;3.5;2" dur="3.5s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3.5s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="520" cy="150" r="3" fill="#6C63FF">
      <animate attributeName="r" values="3;4.5;3" dur="2.8s" repeatCount="indefinite" begin="0.3s"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" repeatCount="indefinite" begin="0.3s"/>
    </circle>

    <circle cx="750" cy="100" r="2.5" fill="#a78bfa">
      <animate attributeName="r" values="2.5;4;2.5" dur="3.2s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <circle cx="850" cy="160" r="2" fill="#6C63FF">
      <animate attributeName="r" values="2;3.5;2" dur="4.5s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    <circle cx="680" cy="180" r="3" fill="#c084fc">
      <animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite" begin="2s"/>
    </circle>

    <circle cx="350" cy="300" r="2" fill="#6C63FF">
      <animate attributeName="r" values="2;3.5;2" dur="4s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
    <circle cx="500" cy="320" r="2.5" fill="#a78bfa">
      <animate attributeName="r" values="2.5;4;2.5" dur="3.5s" repeatCount="indefinite" begin="0.7s"/>
    </circle>
    <circle cx="750" cy="310" r="2" fill="#c084fc">
      <animate attributeName="r" values="2;3;2" dur="3.8s" repeatCount="indefinite" begin="2.2s"/>
    </circle>
    <circle cx="900" cy="290" r="2.5" fill="#6C63FF">
      <animate attributeName="r" values="2.5;4;2.5" dur="3.3s" repeatCount="indefinite" begin="0.4s"/>
    </circle>

    <!-- CONNECTIONS -->
    <line x1="300" y1="120" x2="450" y2="80" stroke="#6C63FF" stroke-width="0.8" opacity="0.3">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="450" y1="80" x2="520" y2="150" stroke="#a78bfa" stroke-width="0.6" opacity="0.25">
      <animate attributeName="opacity" values="0.1;0.35;0.1" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
    </line>
    <line x1="300" y1="120" x2="380" y2="180" stroke="#c084fc" stroke-width="0.7" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="5s" repeatCount="indefinite" begin="1s"/>
    </line>
    <line x1="380" y1="180" x2="520" y2="150" stroke="#6C63FF" stroke-width="0.5" opacity="0.25">
      <animate attributeName="opacity" values="0.1;0.35;0.1" dur="4.2s" repeatCount="indefinite" begin="0.8s"/>
    </line>
    <line x1="520" y1="150" x2="680" y2="180" stroke="#a78bfa" stroke-width="0.6" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="3.8s" repeatCount="indefinite" begin="1.5s"/>
    </line>
    <line x1="680" y1="180" x2="750" y2="100" stroke="#6C63FF" stroke-width="0.7" opacity="0.3">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="4.5s" repeatCount="indefinite" begin="0.3s"/>
    </line>
    <line x1="750" y1="100" x2="850" y2="160" stroke="#c084fc" stroke-width="0.5" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="3.2s" repeatCount="indefinite" begin="2s"/>
    </line>
    <line x1="350" y1="300" x2="500" y2="320" stroke="#6C63FF" stroke-width="0.6" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite" begin="1.2s"/>
    </line>
    <line x1="500" y1="320" x2="750" y2="310" stroke="#a78bfa" stroke-width="0.5" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.25;0.1" dur="5s" repeatCount="indefinite" begin="0.6s"/>
    </line>
    <line x1="750" y1="310" x2="900" y2="290" stroke="#c084fc" stroke-width="0.6" opacity="0.25">
      <animate attributeName="opacity" values="0.1;0.35;0.1" dur="3.5s" repeatCount="indefinite" begin="1.8s"/>
    </line>
    <line x1="380" y1="180" x2="350" y2="300" stroke="#6C63FF" stroke-width="0.4" opacity="0.15">
      <animate attributeName="opacity" values="0.05;0.2;0.05" dur="6s" repeatCount="indefinite"/>
    </line>
    <line x1="680" y1="180" x2="750" y2="310" stroke="#a78bfa" stroke-width="0.4" opacity="0.15">
      <animate attributeName="opacity" values="0.05;0.2;0.05" dur="5.5s" repeatCount="indefinite" begin="1s"/>
    </line>
    <line x1="850" y1="160" x2="900" y2="290" stroke="#6C63FF" stroke-width="0.4" opacity="0.15">
      <animate attributeName="opacity" values="0.05;0.2;0.05" dur="4.8s" repeatCount="indefinite" begin="2s"/>
    </line>

    <!-- TRAVELLING PULSES along connections -->
    <circle r="2" fill="#6C63FF" opacity="0.8">
      <animateMotion dur="3s" repeatCount="indefinite" path="M300,120 L450,80 L520,150 L680,180 L750,100 L850,160"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.5" fill="#c084fc" opacity="0.6">
      <animateMotion dur="4s" repeatCount="indefinite" path="M850,160 L750,100 L680,180 L520,150 L380,180 L300,120" begin="1.5s"/>
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    <circle r="1.5" fill="#a78bfa" opacity="0.7">
      <animateMotion dur="3.5s" repeatCount="indefinite" path="M350,300 L500,320 L750,310 L900,290" begin="0.8s"/>
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.5s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
  </g>

  <!-- ============ FLOATING ORBIT RINGS ============ -->
  <g opacity="0.15">
    <ellipse cx="600" cy="200" rx="350" ry="60" fill="none" stroke="#6C63FF" stroke-width="0.5" stroke-dasharray="4,8">
      <animateTransform attributeName="transform" type="rotate" values="0 600 200;360 600 200" dur="30s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="600" cy="200" rx="280" ry="90" fill="none" stroke="#a78bfa" stroke-width="0.4" stroke-dasharray="3,10">
      <animateTransform attributeName="transform" type="rotate" values="360 600 200;0 600 200" dur="25s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- ============ MAIN TITLE ============ -->
  <g filter="url(#textGlow)">
    <text x="600" y="175" text-anchor="middle" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-size="52" font-weight="800" fill="url(#titleGrad)" letter-spacing="3">
      VEACESLAV COLTUC
    </text>
  </g>
  <!-- Subtitle -->
  <text x="600" y="215" text-anchor="middle" font-family="'Fira Code', 'Courier New', monospace" font-size="16" fill="url(#subtitleGrad)" letter-spacing="5" opacity="0.9">
    SOFTWARE ENGINEER  ·  FUTURE FULL-STACK DEV
  </text>

  <!-- Animated underline -->
  <line x1="350" y1="235" x2="350" y2="235" stroke="#6C63FF" stroke-width="2" stroke-linecap="round" opacity="0.7">
    <animate attributeName="x2" values="350;850;350" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="6s" repeatCount="indefinite"/>
  </line>

  <!-- ============ BOTTOM STATUS LINE ============ -->
  <g font-family="'Fira Code', 'Courier New', monospace" font-size="11" opacity="0.4">
    <text x="30" y="380" fill="#6C63FF">
      <tspan>$ git commit -m "building the future"</tspan>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
    </text>
    <text x="870" y="380" fill="#555">
      <tspan>chisinau, moldova · </tspan>
      <tspan fill="#6C63FF">online</tspan>
      <tspan fill="#4ade80"> ●</tspan>
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="3s" repeatCount="indefinite" begin="1s"/>
    </text>
  </g>

  <!-- Scanline effect -->
  <rect x="0" y="0" width="1200" height="2" fill="#6C63FF" opacity="0.03">
    <animate attributeName="y" values="-2;400" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Vignette overlay -->
  <rect width="1200" height="400" fill="url(#bg)" opacity="0" rx="0"/>
</svg>
