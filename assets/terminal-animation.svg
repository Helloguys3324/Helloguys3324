<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="tbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="titlebar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#252540"/>
      <stop offset="100%" stop-color="#1e1e35"/>
    </linearGradient>
    <filter id="tglow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Terminal window -->
  <rect width="800" height="300" rx="12" fill="url(#tbg)" stroke="#2a2a4a" stroke-width="1"/>
  
  <!-- Title bar -->
  <rect width="800" height="36" rx="12" fill="url(#titlebar)"/>
  <rect x="0" y="24" width="800" height="12" fill="url(#titlebar)"/>
  
  <!-- Traffic lights -->
  <circle cx="24" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="18" r="6" fill="#febc2e"/>
  <circle cx="64" cy="18" r="6" fill="#28c840"/>
  
  <!-- Title text -->
  <text x="400" y="22" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#8b8ba7">veaceslav@utm — ~/projects</text>

  <!-- Line numbers gutter -->
  <g font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#3a3a5c">
    <text x="20" y="68">1</text>
    <text x="20" y="90">2</text>
    <text x="20" y="112">3</text>
    <text x="20" y="134">4</text>
    <text x="20" y="156">5</text>
    <text x="20" y="178">6</text>
    <text x="20" y="200">7</text>
    <text x="20" y="222">8</text>
    <text x="20" y="244">9</text>
    <text x="14" y="266">10</text>
  </g>

  <!-- Gutter line -->
  <line x1="42" y1="44" x2="42" y2="280" stroke="#2a2a4a" stroke-width="1"/>

  <!-- CODE CONTENT with typing animations -->
  <g font-family="'SF Mono', 'Fira Code', monospace" font-size="13" filter="url(#tglow)">
    
    <!-- Line 1: class keyword -->
    <text x="55" y="68">
      <tspan fill="#c084fc">class</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#fbbf24">Developer</tspan><tspan fill="#e2e8f0"> {</tspan>
      <animate attributeName="opacity" values="0;0;1;1" dur="12s" repeatCount="indefinite" keyTimes="0;0.02;0.05;1"/>
    </text>

    <!-- Line 2: name -->
    <text x="75" y="90">
      <tspan fill="#6C63FF">name</tspan><tspan fill="#e2e8f0">: </tspan><tspan fill="#a5d6a7">"Veaceslav Coltuc"</tspan><tspan fill="#e2e8f0">,</tspan>
      <animate attributeName="opacity" values="0;0;1;1" dur="12s" repeatCount="indefinite" keyTimes="0;0.08;0.12;1"/>
    </text>

    <!-- Line 3: role -->
    <text x="75" y="112">
      <tspan fill="#6C63FF">role</tspan><tspan fill="#e2e8f0">: </tspan><tspan fill="#a5d6a7">"Software Engineer"</tspan><tspan fill="#e2e8f0">,</tspan>
      <animate attributeName="opacity" values="0;0;1;1" dur="12s" repeatCount="indefinite" keyTimes="0;0.15;0.19;1"/>
    </text>

    <!-- Line 4: location -->
    <text x="75" y="134">
      <tspan fill="#6C63FF">location</tspan><tspan fill="#e2e8f0">: </tspan><tspan fill="#a5d6a7">"Chisinau, Moldova 🇲🇩"</tspan><tspan fill="#e2e8f0">,</tspan>
      <animate attributeName="opacity" values="0;0;1;1" dur="12s" repeatCount="indefinite" keyTimes="0;0.22;0.26;1"/>
    </text>

    <!-- Line 5: skills -->
    <text x="75" y="156">
      <tspan fill="#6C63FF">skills</tspan><tspan fill="#e2e8f0">: [</tspan><tspan fill="#a5d6a7">"JS"</tspan><tspan fill="#e2e8f0">, </tspan><tspan fill="#a5d6a7">"Python"</tspan><tspan fill="#e2e8f0">, </tspan><tspan fill="#a5d6a7">"C/C++"</tspan><tspan fill="#e2e8f0">, </tspan><tspan fill="#a5d6a7">"React"</tspan><tspan fill="#e2e8f0">],</tspan>
      <animate attributeName="opacity" values="0;0;1;1" dur="12s" repeatCount="indefinite" keyTimes="0;0.29;0.35;1"/>
    </text>

    <!-- Line 6: blank + method -->
    <text x="75" y="178">
      <tspan fill="#e2e8f0"> </tspan>
    </text>
    <text x="75" y="178">
      <tspan fill="#c084fc">async</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#fbbf24">buildSomethingAmazing</tspan><tspan fill="#e2e8f0">() {</tspan>
      <animate attributeName="opacity" values="0;0;1;1" dur="12s" repeatCount="indefinite" keyTimes="0;0.40;0.46;1"/>
    </text>

    <!-- Line 7: while loop -->
    <text x="95" y="200">
      <tspan fill="#c084fc">while</tspan><tspan fill="#e2e8f0"> (</tspan><tspan fill="#6C63FF">this</tspan><tspan fill="#e2e8f0">.</tspan><tspan fill="#6C63FF">alive</tspan><tspan fill="#e2e8f0">) {</tspan>
      <animate attributeName="opacity" values="0;0;1;1" dur="12s" repeatCount="indefinite" keyTimes="0;0.50;0.55;1"/>
    </text>

    <!-- Line 8: eat code sleep -->
    <text x="115" y="222">
      <tspan fill="#6C63FF">eat</tspan><tspan fill="#e2e8f0">();</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#6C63FF">code</tspan><tspan fill="#e2e8f0">();</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#6C63FF">sleep</tspan><tspan fill="#e2e8f0">();</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#6C63FF">repeat</tspan><tspan fill="#e2e8f0">();</tspan>
      <animate attributeName="opacity" values="0;0;1;1" dur="12s" repeatCount="indefinite" keyTimes="0;0.58;0.65;1"/>
    </text>

    <!-- Line 9: closing braces -->
    <text x="95" y="244">
      <tspan fill="#e2e8f0">}</tspan>
      <animate attributeName="opacity" values="0;0;1;1" dur="12s" repeatCount="indefinite" keyTimes="0;0.70;0.73;1"/>
    </text>

    <!-- Line 10: closing braces -->
    <text x="55" y="266">
      <tspan fill="#e2e8f0">}</tspan>
      <animate attributeName="opacity" values="0;0;1;1" dur="12s" repeatCount="indefinite" keyTimes="0;0.76;0.79;1"/>
    </text>
  </g>

  <!-- Blinking cursor -->
  <rect x="67" y="256" width="8" height="15" fill="#6C63FF" rx="1">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="x" values="67;67;67;67;67;67;67;67;67;67" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="y" values="58;58;80;80;102;102;124;124;146;146;168;168;190;190;212;212;234;234;256;256" dur="12s" repeatCount="indefinite"/>
  </rect>

  <!-- Active line highlight -->
  <rect x="43" y="253" width="750" height="20" fill="#6C63FF" opacity="0.04" rx="2">
    <animate attributeName="y" values="55;55;77;77;99;99;121;121;143;143;165;165;187;187;209;209;231;231;253;253" dur="12s" repeatCount="indefinite"/>
  </rect>

  <!-- Minimap (right side decoration) -->
  <g opacity="0.15">
    <rect x="745" y="50" width="40" height="3" rx="1" fill="#6C63FF">
      <animate attributeName="opacity" values="0;0.15;0.15" dur="12s" repeatCount="indefinite" keyTimes="0;0.05;1"/>
    </rect>
    <rect x="750" y="57" width="30" height="3" rx="1" fill="#a78bfa">
      <animate attributeName="opacity" values="0;0.15;0.15" dur="12s" repeatCount="indefinite" keyTimes="0;0.12;1"/>
    </rect>
    <rect x="750" y="64" width="35" height="3" rx="1" fill="#6C63FF">
      <animate attributeName="opacity" values="0;0.15;0.15" dur="12s" repeatCount="indefinite" keyTimes="0;0.19;1"/>
    </rect>
    <rect x="750" y="71" width="28" height="3" rx="1" fill="#c084fc">
      <animate attributeName="opacity" values="0;0.15;0.15" dur="12s" repeatCount="indefinite" keyTimes="0;0.26;1"/>
    </rect>
    <rect x="750" y="78" width="38" height="3" rx="1" fill="#6C63FF">
      <animate attributeName="opacity" values="0;0.15;0.15" dur="12s" repeatCount="indefinite" keyTimes="0;0.35;1"/>
    </rect>
    <rect x="750" y="85" width="25" height="3" rx="1" fill="#a78bfa">
      <animate attributeName="opacity" values="0;0.15;0.15" dur="12s" repeatCount="indefinite" keyTimes="0;0.46;1"/>
    </rect>
    <rect x="750" y="92" width="33" height="3" rx="1" fill="#6C63FF">
      <animate attributeName="opacity" values="0;0.15;0.15" dur="12s" repeatCount="indefinite" keyTimes="0;0.55;1"/>
    </rect>
    <rect x="755" y="99" width="28" height="3" rx="1" fill="#c084fc">
      <animate attributeName="opacity" values="0;0.15;0.15" dur="12s" repeatCount="indefinite" keyTimes="0;0.65;1"/>
    </rect>
    <rect x="750" y="106" width="18" height="3" rx="1" fill="#6C63FF">
      <animate attributeName="opacity" values="0;0.15;0.15" dur="12s" repeatCount="indefinite" keyTimes="0;0.73;1"/>
    </rect>
    <rect x="745" y="113" width="15" height="3" rx="1" fill="#a78bfa">
      <animate attributeName="opacity" values="0;0.15;0.15" dur="12s" repeatCount="indefinite" keyTimes="0;0.79;1"/>
    </rect>
  </g>
</svg>
